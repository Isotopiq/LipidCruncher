version: "3.9"

services:
  lipidcruncher:
    build:
      context: .
      dockerfile: Dockerfile
    image: lipidcruncher:latest
    container_name: lipidcruncher
    restart: unless-stopped

    ports:
      - "8501:8501"

    environment:
      # Required for running behind a reverse proxy (Easypanel uses Traefik)
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_SERVER_ENABLE_CORS=false
      - STREAMLIT_SERVER_ENABLE_XSRF_PROTECTION=false
      # Matches the existing .streamlit/config.toml
      - STREAMLIT_SERVER_MAX_UPLOAD_SIZE=1000
      # Optional: set a base URL path if you deploy to a subpath
      # - STREAMLIT_SERVER_BASE_URL_PATH=/lipidcruncher

    volumes:
      # Persistent storage for any session-generated files or exports
      - lipidcruncher_data:/app/data

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8745/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  lipidcruncher_data:
    driver: local
