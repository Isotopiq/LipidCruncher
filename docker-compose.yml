version: "3.9"

services:
  lipidcruncher:
    build:
      context: .
      dockerfile: Dockerfile
    image: lipidcruncher:latest
    container_name: lipidcruncher
    restart: unless-stopped

    ports:
      - "8501:8501"

    environment:
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_SERVER_ENABLE_CORS=false
      - STREAMLIT_SERVER_ENABLE_XSRF_PROTECTION=false
      - STREAMLIT_SERVER_MAX_UPLOAD_SIZE=800
      - STREAMLIT_SERVER_ENABLE_WEBSOCKET_COMPRESSION=false

      # *** CRITICAL: Set these to your actual public domain ***
      - STREAMLIT_BROWSER_SERVER_ADDRESS=https://science-lipidcruncher.cu4huf.easypanel.host
      - STREAMLIT_BROWSER_SERVER_PORT=443

    volumes:
      - lipidcruncher_data:/app/data

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  lipidcruncher_data:
    driver: local
